name: Update progress

on:
  push:
    paths:
      - "solutions/**"
      - "scripts/generate_progress.py"
      - ".github/workflows/update-progress.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-progress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate PROGRESS.md
        run: python scripts/generate_progress.py

      - name: Commit and push PROGRESS.md
        run: |
          if git diff --quiet -- PROGRESS.md; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PROGRESS.md
          git commit -m "chore: update progress [skip ci]"
          git push
